name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate scaffold
        run: |
          test -f README.md
          test -f LICENSE
          test -f NOTICE.md
          test -f data/LICENSE.md
          test -d specs
          test -d swift
          test -d kotlin
          test -d tests
          test -d tools
